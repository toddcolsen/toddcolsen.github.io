           I got my Masters degree in Computer Science from UMBC.  My focus was on Machine Learning and I was part of the DIADIC (DIstributed Adaptive Discovery and Computation) group headed by [Dr. Hillol Kargupta](https://userpages.cs.umbc.edu/hillol/).  My thesis was titled "Distributed Decision Tree Learning From Multiple Heterogeneous Data Sources".
           
