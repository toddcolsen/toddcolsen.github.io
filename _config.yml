# about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
  I'm a data scientist / engineer who can oversee the entire data lifecycle.  I can move it, transform it, store it, analyze it, and then communicate what it means.  
  
  For the last 13 years I have been in the heavy equipment space.  I most recently worked for the Volvo Group at their plant in Hagerstown, MD, where I processed and analyzed data from diesel engines.  Before that I was outside Pittsburgh, PA, building predictive models on data from mining machinry for Komatsu Mining.
  
   
  In my private life I am a husband and father.  I like to hike and shoot pool and I am on a few local APA teams with my wife Sara.  I'm also  big history nerd, especially ancient history.  I recently restarted a long-dormant project to use data analysis to help understand the ancient Indus Script (see below).  I put it aside when I had kids, but recently picked it up again.

