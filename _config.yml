        description: | # this will include new lines to allow paragraphs
          This is a blast from the past!  I recently rediscovered something I made 20+ years ago and thought was lost. This was my first extra-curricular project in data analysis and visualization.  It's is a Java-based online poker assistant that was designed to 
          help while you were playing Party Poker (This is over 20 years old and won't work today).  It would constantly scan the log files from your games and form a table history of everything you "saw" since sitting at the table into a simple, easy-to-use interface that could give you meaningful information without causing excessive delays while playing.  
          
          The GitHub contains a playable demo.
          
          
